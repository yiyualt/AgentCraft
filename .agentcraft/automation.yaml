# Automation Configuration Template
# Copy to ~/.agentcraft/automation.yaml and customize

# Cron Scheduler Settings
scheduler:
  enabled: true
  check_interval: 60  # Health check interval in seconds
  max_run_time: 3600  # Max job run time before considering stuck (seconds)

# Default job settings
defaults:
  agent_type: general-purpose
  timeout: 180
  max_retries: 0
  session_target: isolated  # main, isolated, new

# Delivery settings
delivery:
  # Default channel for announce delivery
  default_channel: cli
  # Webhook settings
  webhook_timeout: 30
  # Failure notification
  notify_on_failure: true
  failure_channel: cli

