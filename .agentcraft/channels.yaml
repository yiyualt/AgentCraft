# Channels Configuration Template
# Copy to ~/.agentcraft/channels.yaml and customize

# Telegram Bot configuration
telegram:
  enabled: false
  bot_token: ""  # Set via TELEGRAM_BOT_TOKEN env var or here
  polling_interval: 1  # Seconds between poll requests
  timeout: 30  # Long polling timeout

# Web/SSE configuration
web:
  enabled: true
  default_session: "web-default"
  max_connections: 100

# CLI configuration
cli:
  enabled: true
  default_session: "cli-default"
  history_file: "~/.agentcraft/cli-history.txt"
  history_max_lines: 1000

# WeCom (企业微信) configuration
wecom:
  enabled: false
  corp_id: ""  # 企业ID
  agent_id: ""  # 应用AgentId
  secret: ""  # 应用Secret
  token: ""  # 回调Token
  encoding_aes_key: ""  # 回调EncodingAESKey

# Message routing
routing:
  # Default channel for outgoing messages
  default_channel: "cli"

  # Channel priority for fallback
  priority:
    - cli
    - web
    - telegram
    - wecom

  # Session name format: {channel}-{peer_id}
  session_format: "{channel}-{peer_id}"

# Rate limiting
rate_limit:
  enabled: false
  max_messages_per_minute: 60
  max_messages_per_hour: 1000