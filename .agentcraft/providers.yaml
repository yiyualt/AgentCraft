# Provider Configuration Template
# Copy to ~/.agentcraft/providers.yaml and customize

# Provider priority: higher number = tried first
# DeepSeek (100) > Anthropic (50) > OpenAI (0)

providers:
  deepseek:
    priority: 100
    cooldown_seconds: 60
    max_failures_before_disable: 10
    keys:
      # Simple key format (string)
      - "sk-deepseek-key-1"
      # Or detailed format with metadata
      - key: "sk-deepseek-key-2"
        name: "backup-key"
        priority: 10  # Lower priority within provider
        enabled: true

  anthropic:
    priority: 50
    cooldown_seconds: 120  # Longer cooldown for Anthropic
    keys:
      - "sk-ant-key-1"

  openai:
    priority: 0  # Lowest priority (fallback)
    cooldown_seconds: 60
    keys:
      - "sk-openai-key-1"

