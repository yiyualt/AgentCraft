<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentCraft 架构图</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f0e6;
            color: #333;
            min-height: 100vh;
        }

        .deck {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .slide {
            margin-bottom: 60px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 30px;
        }

        .slide-title {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #4fc3f7;
        }

        .slide-subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }

        svg {
            width: 100%;
            height: auto;
        }

        /* SVG internal styles */
        .group-box {
            fill: #f8f9fa;
            stroke: #ddd;
            stroke-width: 1;
            rx: 8;
        }

        .node-box {
            fill: #fff;
            stroke: #bbb;
            stroke-width: 1.5;
            rx: 6;
        }

        .node-title {
            font-size: 14px;
            font-weight: 600;
            fill: #1a1a2e;
        }

        .node-subtitle {
            font-size: 11px;
            fill: #666;
        }

        .arrow-primary {
            fill: none;
            stroke: #4fc3f7;
            stroke-width: 2;
            marker-end: url(#arrowhead-primary);
        }

        .arrow-secondary {
            fill: none;
            stroke: #888;
            stroke-width: 1.5;
            stroke-dasharray: 4 3;
            marker-end: url(#arrowhead-secondary);
        }

        .arrow-support {
            fill: none;
            stroke: #4caf50;
            stroke-width: 1.5;
            marker-end: url(#arrowhead-support);
        }

        .group-label {
            font-size: 16px;
            font-weight: 600;
            fill: #555;
        }

        .external-box {
            fill: #e3f2fd;
            stroke: #90caf9;
            stroke-width: 1;
            rx: 6;
        }

        .llm-box {
            fill: #fff3e0;
            stroke: #ffb74d;
            stroke-width: 2;
            rx: 6;
        }

        .title-badge {
            fill: #4fc3f7;
            rx: 4;
        }

        .title-badge-text {
            fill: #fff;
            font-size: 11px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="deck">
        <!-- Slide 1: Overall Architecture -->
        <div class="slide">
            <div class="slide-title">AgentCraft 总体架构</div>
            <div class="slide-subtitle">多渠道接入的 AI Agent 网关服务</div>

            <svg viewBox="0 0 1100 500" xmlns="http://www.w3.org/2000/svg">
                <!-- Arrow markers -->
                <defs>
                    <marker id="arrowhead-primary" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#4fc3f7"/>
                    </marker>
                    <marker id="arrowhead-secondary" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
                        <polygon points="0 0, 8 3, 0 6" fill="#888"/>
                    </marker>
                    <marker id="arrowhead-support" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
                        <polygon points="0 0, 8 3, 0 6" fill="#4caf50"/>
                    </marker>
                </defs>

                <!-- Layer 1: Access Channels -->
                <g id="access-layer">
                    <rect class="group-box" x="20" y="30" width="200" height="180"/>
                    <text class="group-label" x="30" y="55">接入层</text>

                    <!-- Telegram -->
                    <rect class="node-box" x="40" y="70" width="160" height="50"/>
                    <text class="node-title" x="50" y="95">Telegram Bot</text>
                    <text class="node-subtitle" x="50" y="112">Polling 消息轮询</text>

                    <!-- Web Chat -->
                    <rect class="node-box" x="40" y="140" width="160" height="50"/>
                    <text class="node-title" x="50" y="165">Web Chat</text>
                    <text class="node-subtitle" x="50" y="182">HTML/JS 前端</text>
                </g>

                <!-- Layer 2: Gateway -->
                <g id="gateway-layer">
                    <rect class="group-box" x="280" y="30" width="200" height="180"/>
                    <text class="group-label" x="290" y="55">控制层</text>

                    <rect class="node-box" x="300" y="70" width="160" height="120"/>
                    <text class="node-title" x="310" y="95">Gateway</text>
                    <text class="node-subtitle" x="310" y="112">FastAPI 网关</text>
                    <text class="node-subtitle" x="310" y="130">/v1/chat/completions</text>
                    <text class="node-subtitle" x="310" y="148">Tool Loop 执行</text>
                    <text class="node-subtitle" x="310" y="166">MLflow Tracing</text>
                </g>

                <!-- Layer 3: Agent Core -->
                <g id="core-layer">
                    <rect class="group-box" x="540" y="30" width="280" height="180"/>
                    <text class="group-label" x="550" y="55">Agent 核心</text>

                    <!-- Session Manager -->
                    <rect class="node-box" x="560" y="70" width="120" height="50"/>
                    <text class="node-title" x="570" y="95">Session</text>
                    <text class="node-subtitle" x="570" y="112">SQLite 持久化</text>

                    <!-- Memory -->
                    <rect class="node-box" x="700" y="70" width="100" height="50"/>
                    <text class="node-title" x="710" y="95">Memory</text>
                    <text class="node-subtitle" x="710" y="112">滑动窗口截断</text>

                    <!-- Skills -->
                    <rect class="node-box" x="560" y="140" width="120" height="50"/>
                    <text class="node-title" x="570" y="165">Skills</text>
                    <text class="node-subtitle" x="570" y="182">角色/能力注入</text>

                    <!-- Tools Registry -->
                    <rect class="node-box" x="700" y="140" width="100" height="50"/>
                    <text class="node-title" x="710" y="165">Tools</text>
                    <text class="node-subtitle" x="710" y="182">工具注册表</text>
                </g>

                <!-- Layer 4: External -->
                <g id="external-layer">
                    <!-- DeepSeek -->
                    <rect class="llm-box" x="880" y="70" width="180" height="70"/>
                    <text class="node-title" x="890" y="95">DeepSeek API</text>
                    <text class="node-subtitle" x="890" y="112">LLM 推理服务</text>
                    <text class="node-subtitle" x="890" y="130">64K Context Window</text>

                    <!-- MLflow -->
                    <rect class="external-box" x="880" y="160" width="180" height="50"/>
                    <text class="node-title" x="890" y="185">MLflow</text>
                    <text class="node-subtitle" x="890" y="202">全链路追踪</text>
                </g>

                <!-- Layer 5: Tool Sources (bottom) -->
                <g id="tools-layer">
                    <rect class="group-box" x="280" y="250" width="280" height="120"/>
                    <text class="group-label" x="290" y="275">工具来源</text>

                    <!-- Built-in Tools -->
                    <rect class="node-box" x="300" y="290" width="120" height="50"/>
                    <text class="node-title" x="310" y="315">Built-in</text>
                    <text class="node-subtitle" x="310" y="332">本地 Python 函数</text>

                    <!-- MCP Tools -->
                    <rect class="node-box" x="440" y="290" width="100" height="50"/>
                    <text class="node-title" x="450" y="315">MCP</text>
                    <text class="node-subtitle" x="450" y="332">外部工具服务</text>
                </g>

                <!-- Layer 6: Skill Sources -->
                <g id="skills-layer">
                    <rect class="group-box" x="600" y="250" width="200" height="120"/>
                    <text class="group-label" x="610" y="275">Skill 来源</text>

                    <rect class="node-box" x="620" y="290" width="160" height="50"/>
                    <text class="node-title" x="630" y="315">Skill Definitions</text>
                    <text class="node-subtitle" x="630" y="332">JSON 配置文件</text>
                </g>

                <!-- Arrows: Access → Gateway -->
                <path class="arrow-primary" d="M 200 95 L 280 95"/>
                <path class="arrow-primary" d="M 200 165 L 280 130"/>

                <!-- Arrows: Gateway → Core -->
                <path class="arrow-primary" d="M 480 130 L 540 130"/>

                <!-- Arrows: Gateway → External -->
                <path class="arrow-primary" d="M 820 130 L 860 105"/>

                <!-- Arrows: Gateway → MLflow (support) -->
                <path class="arrow-support" d="M 820 170 L 860 185"/>

                <!-- Arrows: Tools → Gateway (support) -->
                <path class="arrow-support" d="M 420 250 L 420 220"/>

                <!-- Arrows: Skills → Core (support) -->
                <path class="arrow-support" d="M 700 250 L 700 190"/>
                <path class="arrow-support" d="M 620 250 L 620 190"/>

                <!-- Data flow annotations -->
                <text x="230" y="80" fill="#4fc3f7" font-size="10">消息</text>
                <text x="500" y="115" fill="#4fc3f7" font-size="10">上下文</text>
                <text x="840" y="90" fill="#4fc3f7" font-size="10">推理</text>
                <text x="840" y="165" fill="#4caf50" font-size="10">Trace</text>

                <!-- Legend -->
                <g transform="translate(30, 420)">
                    <text x="0" y="0" fill="#666" font-size="12">图例：</text>
                    <line x1="50" y1="-5" x2="90" y2="-5" stroke="#4fc3f7" stroke-width="2"/>
                    <text x="95" y="0" fill="#666" font-size="11">主数据流</text>
                    <line x1="160" y1="-5" x2="200" y2="-5" stroke="#4caf50" stroke-width="1.5"/>
                    <text x="205" y="0" fill="#666" font-size="11">支撑服务</text>
                    <line x1="280" y1="-5" x2="320" y2="-5" stroke="#888" stroke-width="1.5" stroke-dasharray="4 3"/>
                    <text x="325" y="0" fill="#666" font-size="11">可选/配置</text>
                </g>
            </svg>
        </div>

        <!-- Slide 2: Runtime Flow -->
        <div class="slide">
            <div class="slide-title">请求处理流程</div>
            <div class="slide-subtitle">从用户消息到 LLM 响应的完整链路</div>

            <svg viewBox="0 0 1100 320" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <marker id="arrowhead-runtime" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#4fc3f7"/>
                    </marker>
                    <marker id="arrowhead-return" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
                    </marker>
                </defs>

                <!-- Main flow nodes -->
                <g id="flow-main">
                    <!-- 1. User Input -->
                    <rect class="node-box" x="30" y="120" width="100" height="60"/>
                    <text class="node-title" x="40" y="145">用户消息</text>
                    <text class="node-subtitle" x="40" y="162">"帮我查天气"</text>
                    <rect class="title-badge" x="35" y="100" width="25" height="18"/>
                    <text class="title-badge-text" x="38" y="112">1</text>

                    <!-- 2. Channel Router -->
                    <rect class="node-box" x="160" y="120" width="120" height="60"/>
                    <text class="node-title" x="170" y="145">Channel Router</text>
                    <text class="node-subtitle" x="170" y="162">路由到 Session</text>
                    <rect class="title-badge" x="165" y="100" width="25" height="18"/>
                    <text class="title-badge-text" x="168" y="112">2</text>

                    <!-- 3. Session Manager -->
                    <rect class="node-box" x="310" y="120" width="130" height="60"/>
                    <text class="node-title" x="320" y="145">Session Manager</text>
                    <text class="node-subtitle" x="320" y="162">加载历史消息</text>
                    <rect class="title-badge" x="315" y="100" width="25" height="18"/>
                    <text class="title-badge-text" x="318" y="112">3</text>

                    <!-- 4. Memory Strategy -->
                    <rect class="node-box" x="470" y="120" width="130" height="60"/>
                    <text class="node-title" x="480" y="145">Memory</text>
                    <text class="node-subtitle" x="480" y="162">滑动窗口截断</text>
                    <rect class="title-badge" x="475" y="100" width="25" height="18"/>
                    <text class="title-badge-text" x="478" y="112">4</text>

                    <!-- 5. Prompt Builder -->
                    <rect class="node-box" x="630" y="120" width="130" height="60"/>
                    <text class="node-title" x="640" y="145">Prompt Builder</text>
                    <text class="node-subtitle" x="640" y="162">合并 Prompt</text>
                    <rect class="title-badge" x="635" y="100" width="25" height="18"/>
                    <text class="title-badge-text" x="638" y="112">5</text>

                    <!-- 6. Tool Registry -->
                    <rect class="node-box" x="790" y="120" width="100" height="60"/>
                    <text class="node-title" x="800" y="145">Tool Registry</text>
                    <text class="node-subtitle" x="800" y="162">收集 Tools</text>
                    <rect class="title-badge" x="795" y="100" width="25" height="18"/>
                    <text class="title-badge-text" x="798" y="112">6</text>

                    <!-- 7. LLM Call -->
                    <rect class="llm-box" x="920" y="120" width="130" height="60"/>
                    <text class="node-title" x="930" y="145">DeepSeek API</text>
                    <text class="node-subtitle" x="930" y="162">messages + tools</text>
                    <rect class="title-badge" x="925" y="100" width="25" height="18"/>
                    <text class="title-badge-text" x="928" y="112">7</text>
                </g>

                <!-- Main flow arrows -->
                <path class="arrow-primary" d="M 130 150 L 150 150" marker-end="url(#arrowhead-runtime)"/>
                <path class="arrow-primary" d="M 280 150 L 300 150" marker-end="url(#arrowhead-runtime)"/>
                <path class="arrow-primary" d="M 440 150 L 460 150" marker-end="url(#arrowhead-runtime)"/>
                <path class="arrow-primary" d="M 600 150 L 620 150" marker-end="url(#arrowhead-runtime)"/>
                <path class="arrow-primary" d="M 760 150 L 780 150" marker-end="url(#arrowhead-runtime)"/>
                <path class="arrow-primary" d="M 890 150 L 910 150" marker-end="url(#arrowhead-runtime)"/>

                <!-- Tool Loop (bottom) -->
                <g id="tool-loop" transform="translate(0, 200)">
                    <rect class="group-box" x="630" y="20" width="300" height="80" style="fill: #fff8e1; stroke: #ffc107"/>
                    <text x="640" y="40" fill="#666" font-size="12">Tool Loop (循环执行)</text>

                    <!-- Tool Execution -->
                    <rect class="node-box" x="650" y="50" width="100" height="40"/>
                    <text class="node-title" x="660" y="73">Tool Exec</text>
                    <text class="node-subtitle" x="660" y="87">执行工具调用</text>

                    <!-- Result Append -->
                    <rect class="node-box" x="770" y="50" width="100" height="40"/>
                    <text class="node-title" x="780" y="73">Append Result</text>
                    <text class="node-subtitle" x="780" y="87">追加到 messages</text>

                    <!-- Loop arrows -->
                    <path class="arrow-primary" d="M 750 70 L 760 70" marker-end="url(#arrowhead-runtime)"/>
                    <path class="arrow-secondary" d="M 870 70 L 900 70 L 900 150 L 920 150" marker-end="url(#arrowhead-runtime)" style="stroke: #ffc107"/>
                </g>

                <!-- Response return path -->
                <g id="return-path">
                    <path class="arrow-secondary" d="M 980 180 L 980 250 L 30 250 L 30 180" marker-end="url(#arrowhead-return)"/>
                    <text x="500" y="265" fill="#888" font-size="11">返回响应给用户</text>
                </g>

                <!-- Support flows (top) -->
                <g id="support-flows">
                    <!-- Skills -->
                    <rect class="node-box" x="630" y="30" width="130" height="40" style="fill: #e8f5e9"/>
                    <text class="node-title" x="640" y="53">Skills</text>
                    <text class="node-subtitle" x="640" y="67">注入角色指令</text>

                    <!-- MLflow -->
                    <rect class="node-box" x="790" y="30" width="100" height="40" style="fill: #e3f2fd"/>
                    <text class="node-title" x="800" y="53">MLflow</text>
                    <text class="node-subtitle" x="800" y="67">记录 Trace</text>

                    <!-- Support arrows -->
                    <path class="arrow-support" d="M 695 70 L 695 115"/>
                    <path class="arrow-support" d="M 845 70 L 845 115"/>
                </g>
            </svg>
        </div>

        <!-- Slide 3: Core Components -->
        <div class="slide">
            <div class="slide-title">核心组件详解</div>
            <div class="slide-subtitle">Session、Memory、Skills、Tools 的内部结构</div>

            <svg viewBox="0 0 1100 400" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <marker id="arrowhead-detail" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
                        <polygon points="0 0, 8 3, 0 6" fill="#666"/>
                    </marker>
                </defs>

                <!-- Session Model -->
                <g id="session-detail">
                    <rect class="group-box" x="20" y="30" width="250" height="180"/>
                    <text class="group-label" x="30" y="55">Session 会话</text>

                    <rect class="node-box" x="40" y="70" width="210" height="120"/>
                    <text class="node-title" x="50" y="95">Session 数据模型</text>

                    <text x="50" y="115" fill="#666" font-size="11">• id: 会话标识</text>
                    <text x="50" y="130" fill="#666" font-size="11">• name: 会话名称</text>
                    <text x="50" y="145" fill="#666" font-size="11">• model: LLM 模型</text>
                    <text x="50" y="160" fill="#666" font-size="11">• skills: 启用的技能</text>
                    <text x="50" y="175" fill="#666" font-size="11">• context_window: Token 限制</text>

                    <!-- SQLite badge -->
                    <rect x="180" y="200" width="70" height="20" fill="#e3f2fd" rx="3"/>
                    <text x="185" y="215" fill="#1565c0" font-size="10">SQLite</text>
                </g>

                <!-- Memory Strategy -->
                <g id="memory-detail">
                    <rect class="group-box" x="290" y="30" width="250" height="180"/>
                    <text class="group-label" x="300" y="55">Memory 记忆管理</text>

                    <!-- Strategies -->
                    <rect class="node-box" x="310" y="70" width="100" height="60"/>
                    <text class="node-title" x="320" y="95">SlidingWindow</text>
                    <text class="node-subtitle" x="320" y="112">保留最近消息</text>

                    <rect class="node-box" x="420" y="70" width="100" height="60"/>
                    <text class="node-title" x="430" y="95">Summary</text>
                    <text class="node-subtitle" x="430" y="112">摘要旧消息</text>

                    <rect class="node-box" x="310" y="150" width="210" height="40"/>
                    <text class="node-title" x="320" y="173">TokenCalculator</text>
                    <text class="node-subtitle" x="320" y="187">tiktoken cl100k_base</text>

                    <!-- arrows -->
                    <path class="arrow-secondary" d="M 415 150 L 415 130" marker-end="url(#arrowhead-detail)"/>
                    <path class="arrow-secondary" d="M 360 150 L 360 130" marker-end="url(#arrowhead-detail)"/>
                </g>

                <!-- Skills System -->
                <g id="skills-detail">
                    <rect class="group-box" x="560" y="30" width="250" height="180"/>
                    <text class="group-label" x="570" y="55">Skills 技能系统</text>

                    <!-- Skill Definition -->
                    <rect class="node-box" x="580" y="70" width="210" height="90"/>
                    <text class="node-title" x="590" y="95">Skill 定义</text>

                    <text x="590" y="115" fill="#666" font-size="11">• name: 技能名称</text>
                    <text x="590" y="130" fill="#666" font-size="11">• description: 描述</text>
                    <text x="590" y="145" fill="#666" font-size="11">• tools: 可用工具列表</text>
                    <text x="590" y="160" fill="#666" font-size="11">• instructions: 指令模板</text>

                    <!-- SkillLoader -->
                    <rect class="node-box" x="580" y="170" width="100" height="30"/>
                    <text class="node-title" x="590" y="190">Loader</text>

                    <!-- JSON source -->
                    <rect class="external-box" x="690" y="170" width="90" height="30"/>
                    <text x="700" y="190" fill="#1565c0" font-size="10">*.json</text>
                </g>

                <!-- Tools Registry -->
                <g id="tools-detail">
                    <rect class="group-box" x="830" y="30" width="250" height="180"/>
                    <text class="group-label" x="840" y="55">Tools 工具系统</text>

                    <!-- Unified Registry -->
                    <rect class="node-box" x="850" y="70" width="210" height="40"/>
                    <text class="node-title" x="860" y="93">UnifiedToolRegistry</text>

                    <!-- Built-in -->
                    <rect class="node-box" x="850" y="130" width="100" height="60"/>
                    <text class="node-title" x="860" y="155">Built-in</text>
                    <text class="node-subtitle" x="860" y="172">本地 Python</text>
                    <text class="node-subtitle" x="860" y="187">@tool 装饰器</text>

                    <!-- MCP -->
                    <rect class="node-box" x="960" y="130" width="100" height="60"/>
                    <text class="node-title" x="970" y="155">MCP</text>
                    <text class="node-subtitle" x="970" y="172">外部服务</text>
                    <text class="node-subtitle" x="970" y="187">npx/uvx 启动</text>

                    <!-- arrows -->
                    <path class="arrow-secondary" d="M 900 130 L 900 110" marker-end="url(#arrowhead-detail)"/>
                    <path class="arrow-secondary" d="M 1010 130 L 1010 110" marker-end="url(#arrowhead-detail)"/>
                </g>

                <!-- Built-in Tools List -->
                <g id="builtin-tools" transform="translate(20, 230)">
                    <rect class="group-box" x="0" y="0" width="500" height="150"/>
                    <text class="group-label" x="10" y="25">内置工具列表</text>

                    <g transform="translate(20, 40)">
                        <rect class="node-box" x="0" y="0" width="80" height="35"/>
                        <text class="node-title" x="10" y="23">get_time</text>

                        <rect class="node-box" x="90" y="0" width="80" height="35"/>
                        <text class="node-title" x="100" y="23">web_search</text>

                        <rect class="node-box" x="180" y="0" width="80" height="35"/>
                        <text class="node-title" x="190" y="23">read_file</text>

                        <rect class="node-box" x="270" y="0" width="80" height="35"/>
                        <text class="node-title" x="280" y="23">write_file</text>

                        <rect class="node-box" x="360" y="0" width="80" height="35"/>
                        <text class="node-title" x="370" y="23">execute</text>
                    </g>

                    <g transform="translate(20, 85)">
                        <rect class="node-box" x="0" y="0" width="80" height="35"/>
                        <text class="node-title" x="10" y="23">list_files</text>
