<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentCraft Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; height: 100vh; display: flex; flex-direction: column; }

        header { text-align: center; padding: 10px 0; border-bottom: 1px solid #333; }
        header h1 { font-size: 1.5em; color: #4fc3f7; }

        .session-bar { display: flex; gap: 10px; padding: 10px 0; align-items: center; }
        .session-bar select { padding: 8px; border-radius: 4px; background: #16213e; color: #eee; border: 1px solid #333; }
        .session-bar button { padding: 8px 16px; border-radius: 4px; background: #4fc3f7; color: #1a1a2e; border: none; cursor: pointer; }

        #messages { flex: 1; overflow-y: auto; padding: 10px; border-radius: 8px; background: #16213e; margin: 10px 0; }

        .message { margin: 10px 0; padding: 10px 15px; border-radius: 8px; max-width: 80%; }
        .message.user { background: #4fc3f7; color: #1a1a2e; margin-left: auto; }
        .message.assistant { background: #0f3460; }
        .message.system { background: #333; font-size: 0.9em; color: #888; }

        .input-area { display: flex; gap: 10px; padding: 10px 0; }
        #input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #16213e; color: #eee; font-size: 1em; }
        #send { padding: 12px 24px; border-radius: 8px; background: #4fc3f7; color: #1a1a2e; border: none; cursor: pointer; font-weight: bold; }
        #send:disabled { background: #333; color: #888; }

        .loading { display: none; text-align: center; padding: 10px; color: #4fc3f7; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AgentCraft Chat</h1>
        </header>

        <div class="session-bar">
            <select id="session-select">
                <option value="">New Session</option>
            </select>
            <button onclick="newSession()">New</button>
            <button onclick="loadHistory()">History</button>
        </div>

        <div id="messages"></div>
        <div class="loading" id="loading">Thinking...</div>

        <div class="input-area">
            <input type="text" id="input" placeholder="Type a message..." onkeypress="if(event.key==='Enter')send()">
            <button id="send" onclick="send()">Send</button>
        </div>
    </div>

    <script>
        let currentSessionId = null;
        const API_BASE = '/chat';

        // Initialize
        async function init() {
            await loadSessions();
        }

        // Load session list
        async function loadSessions() {
            const resp = await fetch(`${API_BASE}/sessions`);
            const data = await resp.json();

            const select = document.getElementById('session-select');
            select.innerHTML = '<option value="">New Session</option>';

            for (const s of data.sessions) {
                const opt = document.createElement('option');
                opt.value = s.id;
                opt.textContent = `${s.name} (${s.message_count} msgs)`;
                select.appendChild(opt);
            }
        }

        // Create new session
        async function newSession() {
            const resp = await fetch(`${API_BASE}/session/new`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: `web-${Date.now()}`})
            });
            const data = await resp.json();
            currentSessionId = data.session_id;

            document.getElementById('session-select').value = '';
            document.getElementById('messages').innerHTML = '';
            addMessage('system', `New session: ${data.session_id}`);

            await loadSessions();
        }

        // Load history for selected session
        async function loadHistory() {
            const select = document.getElementById('session-select');
            const sessionId = select.value;

            if (!sessionId) {
                alert('Please select a session');
                return;
            }

            currentSessionId = sessionId;
            const resp = await fetch(`${API_BASE}/session/${sessionId}/messages`);
            const data = await resp.json();

            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';

            for (const m of data.messages) {
                addMessage(m.role, m.content);
            }
        }

        // Send message
        async function send() {
            const input = document.getElementById('input');
            const text = input.value.trim();

            if (!text) return;

            addMessage('user', text);
            input.value = '';

            document.getElementById('loading').style.display = 'block';
            document.getElementById('send').disabled = true;

            try {
                const resp = await fetch(`${API_BASE}/message`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({session_id: currentSessionId, text})
                });

                const data = await resp.json();

                if (data.session_id && !currentSessionId) {
                    currentSessionId = data.session_id;
                    addMessage('system', `Session: ${currentSessionId}`);
                }

                addMessage('assistant', data.response || data.error || 'No response');

            } catch (e) {
                addMessage('system', `Error: ${e.message}`);
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('send').disabled = false;

            await loadSessions();
        }

        // Add message to chat
        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = content;
            document.getElementById('messages').appendChild(div);

            // Scroll to bottom
            const messagesDiv = document.getElementById('messages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Start
        init();
    </script>
</body>
</html>
